<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Veículos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
   <div class="container">
        <div class="card">
            <h1>Cadastro de Veículos</h1>
            
            <form id="formVeiculo">
              
                <input type="text" id="modelo"
                 placeholder="Modelo" required>
           
                <input type="text" id="marca" 
                placeholder="Marca" required>
                
             
                <input type="text" id="placa" 
                placeholder="Placa" required>
                
          
                <input type="number" id="ano" 
                placeholder="Ano de fabricação" required>
                
          
                <input type="number" id="valor" step="0.01"
                 placeholder="Valor do veículo" required>

         
                <p>Tipo de Combustível:</p>

                <div class="radio-group">

                    <label>
                        <input type="radio" name="combustivel" value="gasolina" required> Gasolina
                    </label>

                    <label>
                        <input type="radio" name="combustivel" value="etanol"> Etanol
                    </label>

                    <label>
                        <input type="radio" name="combustivel" value="flex"> Flex
                    </label>

                </div>

                <button type="submit" id="btnSalvar">Cadastrar Veículo</button>

            </form>
        </div>
    </div>
</body>
</html>
